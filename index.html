<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定币脱锚监控 · 语音警报</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f9f9f7; color: #1a1a18; padding: 1.5rem; font-size: 14px; }
.dashboard { max-width: 1100px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
.header p { font-size: 13px; color: #6b6b68; }
.alert-banner { background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #A32D2D; display: none; align-items: center; gap: 8px; }
.alert-banner.visible { display: flex; }

/* Voice Alert Panel */
.voice-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; color: white; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
.voice-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.voice-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.voice-icon { font-size: 18px; animation: soundwave 1.5s ease-in-out infinite; }
@keyframes soundwave { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
.voice-toggle { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; color: white; transition: all 0.2s; }
.voice-toggle:hover { background: rgba(255, 255, 255, 0.3); }
.voice-toggle.active { background: white; color: #667eea; border-color: white; }
.voice-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.voice-control { background: rgba(255, 255, 255, 0.15); padding: 10px; border-radius: 8px; }
.voice-control-label { font-size: 11px; opacity: 0.9; margin-bottom: 6px; }
.voice-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255, 255, 255, 0.3); border-radius: 2px; outline: none; }
.voice-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: white; border-radius: 50%; cursor: pointer; }
.voice-slider::-moz-range-thumb { width: 14px; height: 14px; background: white; border-radius: 50%; cursor: pointer; border: none; }
.voice-test-btn { width: 100%; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px; border-radius: 6px; color: white; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.voice-test-btn:hover { background: rgba(255, 255, 255, 0.3); }
.alert-history { background: rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 10px; max-height: 120px; overflow-y: auto; }
.alert-history-item { font-size: 11px; padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; }
.alert-history-item:last-child { border-bottom: none; }
.alert-time { opacity: 0.7; }
.alert-clear { background: none; border: none; color: white; cursor: pointer; font-size: 11px; text-decoration: underline; opacity: 0.8; padding: 4px 0; }
.alert-clear:hover { opacity: 1; }
.voice-status { font-size: 11px; opacity: 0.8; text-align: center; padding-top: 8px; }

.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.summary-card { background: #f1efe8; border-radius: 8px; padding: 12px 14px; }
.summary-label { font-size: 11px; color: #6b6b68; margin-bottom: 4px; }
.summary-val { font-size: 20px; font-weight: 500; color: #1a1a18; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.section-title-text { font-size: 12px; font-weight: 500; color: #6b6b68; text-transform: uppercase; letter-spacing: 0.05em; flex: 1; }
.threshold-info { font-size: 11px; color: #9b9b98; display: flex; gap: 12px; flex-wrap: wrap; }
.t-item { display: flex; align-items: center; gap: 4px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 0 0 10px 0; }
.btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px; background: transparent; color: #6b6b68; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: #f1efe8; }
.btn.loading { opacity: 0.5; pointer-events: none; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.coin-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; position: relative; transition: border-color 0.2s, box-shadow 0.2s; cursor: pointer; }
.coin-card:hover { border-color: rgba(0,0,0,0.25); }
.coin-card.selected { border-color: #1a1a18 !important; box-shadow: 0 0 0 1px #1a1a18; }
.coin-card.status-ok      { border-left: 3px solid #1D9E75; }
.coin-card.status-warn    { border-left: 3px solid #EF9F27; }
.coin-card.status-alert   { border-left: 3px solid #E24B4A; }
.coin-card.status-low     { border-left: 3px solid #378ADD; opacity: 0.85; }
.coin-card.status-loading { border-left: 3px solid rgba(0,0,0,0.1); }
.coin-card.status-kgst-ok    { border-left: 3px solid #7F77DD; }
.coin-card.status-kgst-warn  { border-left: 3px solid #EF9F27; }
.coin-card.status-kgst-alert { border-left: 3px solid #E24B4A; }
.coin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.coin-symbol { font-size: 14px; font-weight: 500; color: #1a1a18; }
.coin-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok, .dot-kgst-ok { background: #1D9E75; }
.dot-kgst-ok { background: #7F77DD; }
.dot-warn, .dot-kgst-warn { background: #EF9F27; }
.dot-alert, .dot-kgst-alert { background: #E24B4A; animation: pulse 1s infinite; }
.dot-low { background: #378ADD; }
.dot-loading { background: rgba(0,0,0,0.15); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.coin-peg-label { font-size: 10px; color: #b0b0ab; margin-bottom: 4px; }
.coin-price { font-size: 22px; font-weight: 500; color: #1a1a18; margin-bottom: 2px; }
.coin-price.ok, .coin-price.kgst-ok { color: #1D9E75; }
.coin-price.warn, .coin-price.kgst-warn { color: #BA7517; }
.coin-price.alert, .coin-price.kgst-alert { color: #A32D2D; }
.coin-deviation { font-size: 12px; margin-bottom: 8px; font-weight: 500; }
.coin-deviation.ok, .coin-deviation.kgst-ok { color: #3B6D11; }
.coin-deviation.warn, .coin-deviation.kgst-warn { color: #854F0B; }
.coin-deviation.alert, .coin-deviation.kgst-alert { color: #A32D2D; }
.coin-meta { font-size: 11px; color: #9b9b98; line-height: 1.6; }
.coin-vol { font-size: 11px; color: #6b6b68; }
.peg-bar-wrap { margin: 8px 0; height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
.peg-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.peg-bar.ok { background: #1D9E75; }
.peg-bar.warn { background: #EF9F27; }
.peg-bar.alert { background: #E24B4A; }
.peg-bar.kgst-ok { background: #7F77DD; }
.peg-bar.kgst-warn { background: #EF9F27; }
.peg-bar.kgst-alert { background: #E24B4A; }
.skeleton { background: #f1efe8; border-radius: 4px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
.reserve-btn { font-size: 11px; margin-top: 8px; padding: 4px 8px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 5px; background: transparent; color: #6b6b68; cursor: pointer; transition: all 0.15s; width: 100%; }
.reserve-btn:hover { background: #f9f9f7; }
.reserve-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.reserve-panel { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
.reserve-panel.visible { display: block; }
.rp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.rp-title { font-size: 15px; font-weight: 500; }
.rp-close { background: none; border: none; cursor: pointer; font-size: 18px; color: #9b9b98; padding: 0; line-height: 1; }
.rp-close:hover { color: #1a1a18; }
.rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
@media (max-width: 600px) { .rp-grid { grid-template-columns: 1fr; } }
.rp-section-title { font-size: 11px; font-weight: 500; color: #9b9b98; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.rp-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); font-size: 12px; gap: 12px; }
.rp-row:last-child { border-bottom: none; }
.rp-key { color: #6b6b68; flex-shrink: 0; min-width: 72px; }
.rp-val { color: #1a1a18; text-align: right; font-weight: 500; word-break: break-word; }
.rp-val.neutral { color: #6b6b68; font-weight: 400; }
.rp-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.tag-green { background: #EAF3DE; color: #3B6D11; }
.tag-amber { background: #FAEEDA; color: #854F0B; }
.tag-red   { background: #FCEBEB; color: #A32D2D; }
.tag-gray  { background: #f1efe8; color: #5F5E5A; }
.tag-blue  { background: #E6F1FB; color: #185FA5; }
.tag-purple{ background: #EEEDFE; color: #534AB7; }
.rp-note { font-size: 11px; color: #6b6b68; line-height: 1.6; }
.rp-link { font-size: 11px; color: #185FA5; text-decoration: none; display: block; margin-top: 4px; }
.rp-link:hover { text-decoration: underline; }
.kgs-bar { background: #EEEDFE; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: #534AB7; display: none; align-items: center; gap: 8px; }
.kgs-bar.show { display: flex; }
.update-time { font-size: 11px; color: #9b9b98; margin-top: 8px; text-align: right; }
.empty-section { font-size: 12px; color: #9b9b98; padding: 10px 0 16px; }
.error-msg { font-size: 12px; color: #6b6b68; text-align: center; padding: 20px; grid-column: 1/-1; }
@media (max-width: 500px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .threshold-info { display: none; }
  body { padding: 1rem; }
  .voice-controls { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>稳定币脱锚监控 · 语音警报</h1>
    <p>实时监控稳定币价格偏离与储备资产风险，智能语音播报脱锚警报 · 每60秒自动刷新 · 点击卡片查看储备详情</p>
  </div>

  <!-- Voice Alert Control Panel -->
  <div class="voice-panel">
    <div class="voice-header">
      <div class="voice-title">
        <span class="voice-icon">🔊</span>
        <span>智能语音警报系统</span>
      </div>
      <button class="voice-toggle" id="voice-toggle" onclick="toggleVoice()">启用语音</button>
    </div>
    
    <div class="voice-controls">
      <div class="voice-control">
        <div class="voice-control-label">音量：<span id="volume-value">80</span>%</div>
        <input type="range" min="0" max="100" value="80" class="voice-slider" id="volume-slider" oninput="updateVolume(this.value)">
      </div>
      <div class="voice-control">
        <div class="voice-control-label">语速：<span id="rate-value">1.0</span>x</div>
        <input type="range" min="0.5" max="2" step="0.1" value="1.0" class="voice-slider" id="rate-slider" oninput="updateRate(this.value)">
      </div>
    </div>
    
    <button class="voice-test-btn" onclick="testVoice()">🎵 测试语音播报</button>
    
    <div class="alert-history" id="alert-history">
      <div style="font-size:11px;opacity:0.8;margin-bottom:6px;">警报历史记录：</div>
      <div id="history-list" style="font-size:11px;opacity:0.7;">暂无警报</div>
    </div>
    <button class="alert-clear" onclick="clearHistory()">清除历史</button>
    
    <div class="voice-status" id="voice-status">
      语音系统就绪 · 等待警报触发
    </div>
  </div>

  <div id="alert-banner" class="alert-banner">
    <span style="font-size:16px;flex-shrink:0">⚠</span>
    <span id="alert-text"></span>
  </div>

  <div class="summary-row">
    <div class="summary-card"><div class="summary-label">监控总数</div><div class="summary-val" id="total-count">—</div></div>
    <div class="summary-card"><div class="summary-label">正常锚定</div><div class="summary-val" style="color:#1D9E75" id="ok-count">—</div></div>
    <div class="summary-card"><div class="summary-label">轻微偏差</div><div class="summary-val" style="color:#BA7517" id="warn-count">—</div></div>
    <div class="summary-card"><div class="summary-label">脱锚警报</div><div class="summary-val" style="color:#A32D2D" id="alert-count">—</div></div>
  </div>

  <div class="reserve-panel" id="reserve-panel">
    <div class="rp-header">
      <div class="rp-title" id="rp-title">储备资产详情</div>
      <button class="rp-close" onclick="closeReserve()">✕</button>
    </div>
    <div id="rp-content"></div>
  </div>

  <div class="section-header">
    <div class="section-title-text">美元锚定稳定币</div>
    <div class="threshold-info">
      <span class="t-item"><span class="t-dot" style="background:#1D9E75"></span>±0.3%内</span>
      <span class="t-item"><span class="t-dot" style="background:#EF9F27"></span>±0.3~1%</span>
      <span class="t-item"><span class="t-dot" style="background:#E24B4A"></span>&gt;±1%</span>
    </div>
    <button class="btn" id="refresh-btn" onclick="fetchAll()">刷新</button>
  </div>
  <hr class="divider">
  <div class="grid" id="main-grid"></div>

  <div id="kgs-rate-bar" class="kgs-bar"><span id="kgs-rate-text"></span></div>
  <div class="section-header">
    <div class="section-title-text">法币锚定（KGS）</div>
    <div class="threshold-info">
      <span class="t-item"><span class="t-dot" style="background:#7F77DD"></span>±0.5%内</span>
      <span class="t-item"><span class="t-dot" style="background:#EF9F27"></span>±0.5~2%</span>
      <span class="t-item"><span class="t-dot" style="background:#E24B4A"></span>&gt;±2%</span>
    </div>
  </div>
  <hr class="divider">
  <div class="grid" id="kgs-grid"></div>

  <div class="section-header" style="margin-top:1.5rem">
    <div class="section-title-text">低交易量稳定币</div>
    <div class="threshold-info"><span class="t-item"><span class="t-dot" style="background:#378ADD"></span>24h 成交量 &lt; $5,000</span></div>
  </div>
  <hr class="divider">
  <div id="low-section"></div>

  <div class="update-time" id="update-time"></div>
</div>

<script>
// ============= Voice Alert System =============
const voiceSystem = {
  enabled: false,
  volume: 0.8,
  rate: 1.0,
  alertHistory: [],
  lastAlerts: new Set(),
  lastRiskAlerts: new Set(),
  
  speak(text, priority = 'normal') {
    if (!this.enabled) return;
    if (!('speechSynthesis' in window)) {
      console.warn('浏览器不支持语音合成');
      return;
    }
    
    // Cancel any ongoing speech for high priority alerts
    if (priority === 'high') {
      window.speechSynthesis.cancel();
    }
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.volume = this.volume;
    utterance.rate = this.rate;
    utterance.lang = 'zh-CN';
    utterance.pitch = priority === 'high' ? 1.2 : 1.0;
    
    window.speechSynthesis.speak(utterance);
    
    // Update status
    document.getElementById('voice-status').textContent = `🔊 正在播报：${text.substring(0, 30)}...`;
    
    utterance.onend = () => {
      document.getElementById('voice-status').textContent = '语音系统就绪 · 等待警报触发';
    };
  },
  
  addToHistory(type, message) {
    const timestamp = new Date().toLocaleTimeString('zh-CN');
    this.alertHistory.unshift({ type, message, timestamp });
    if (this.alertHistory.length > 10) this.alertHistory.pop();
    this.updateHistoryDisplay();
  },
  
  updateHistoryDisplay() {
    const historyList = document.getElementById('history-list');
    if (this.alertHistory.length === 0) {
      historyList.innerHTML = '<div style="opacity:0.7;">暂无警报</div>';
      return;
    }
    
    historyList.innerHTML = this.alertHistory.map(item => {
      const icon = item.type === 'depeg' ? '⚠️' : item.type === 'risk' ? '🔴' : 'ℹ️';
      return `<div class="alert-history-item">
        <span>${icon} ${item.message}</span>
        <span class="alert-time">${item.timestamp}</span>
      </div>`;
    }).join('');
  },
  
  checkDepegAlerts(alerts) {
    if (alerts.length === 0) {
      this.lastAlerts.clear();
      return;
    }
    
    const newAlerts = alerts.filter(symbol => !this.lastAlerts.has(symbol));
    
    if (newAlerts.length > 0) {
      const message = newAlerts.length === 1
        ? `警报！${newAlerts[0]}稳定币发生脱锚，价格偏差超过1%，请立即关注！`
        : `警报！检测到${newAlerts.length}个稳定币脱锚：${newAlerts.join('、')}，请立即关注！`;
      
      this.speak(message, 'high');
      this.addToHistory('depeg', `脱锚: ${newAlerts.join('、')}`);
    }
    
    this.lastAlerts = new Set(alerts);
  },
  
  checkReserveRisks(coins) {
    const highRiskCoins = coins.filter(coin => {
      const reserve = reserves[coin.id];
      if (!reserve) return false;
      
      // Check for high risk or severe issues
      return reserve.risk === 'high' || 
             reserve.mechanism.includes('无准备金') ||
             reserve.collateral.includes('无实物') ||
             reserve.ratio.includes('不足');
    });
    
    const newRiskCoins = highRiskCoins.filter(coin => !this.lastRiskAlerts.has(coin.symbol));
    
    if (newRiskCoins.length > 0) {
      newRiskCoins.forEach(coin => {
        const reserve = reserves[coin.id];
        const message = `风险警告！${coin.symbol}稳定币检测到储备资产风险：${reserve.riskLabel}，${reserve.note.substring(0, 50)}`;
        this.speak(message, 'normal');
        this.addToHistory('risk', `储备风险: ${coin.symbol} - ${reserve.riskLabel}`);
      });
    }
    
    this.lastRiskAlerts = new Set(highRiskCoins.map(c => c.symbol));
  }
};

function toggleVoice() {
  voiceSystem.enabled = !voiceSystem.enabled;
  const btn = document.getElementById('voice-toggle');
  
  if (voiceSystem.enabled) {
    btn.textContent = '已启用 ✓';
    btn.classList.add('active');
    voiceSystem.speak('语音警报系统已启用，开始监控稳定币脱锚情况');
    document.getElementById('voice-status').textContent = '✅ 语音系统已启用 · 实时监控中';
  } else {
    btn.textContent = '启用语音';
    btn.classList.remove('active');
    window.speechSynthesis.cancel();
    document.getElementById('voice-status').textContent = '❌ 语音系统已禁用';
  }
}

function updateVolume(value) {
  voiceSystem.volume = value / 100;
  document.getElementById('volume-value').textContent = value;
}

function updateRate(value) {
  voiceSystem.rate = parseFloat(value);
  document.getElementById('rate-value').textContent = value;
}

function testVoice() {
  const testMessages = [
    '语音系统测试：这是一条测试播报',
    '警报！USDT稳定币发生脱锚，价格偏差超过1%',
    '风险警告！检测到储备资产异常'
  ];
  const randomMessage = testMessages[Math.floor(Math.random() * testMessages.length)];
  voiceSystem.speak(randomMessage, 'normal');
}

function clearHistory() {
  voiceSystem.alertHistory = [];
  voiceSystem.updateHistoryDisplay();
}

// ============= Original Code (with voice integration) =============
const COINS = [
  { id:'tether', symbol:'USDT', peg:'usd', pegTarget:1 },
  { id:'usd-coin', symbol:'USDC', peg:'usd', pegTarget:1 },
  { id:'dai', symbol:'DAI', peg:'usd', pegTarget:1 },
  { id:'first-digital-usd', symbol:'FDUSD', peg:'usd', pegTarget:1 },
  { id:'true-usd', symbol:'TUSD', peg:'usd', pegTarget:1 },
  { id:'paypal-usd', symbol:'PYUSD', peg:'usd', pegTarget:1 },
  { id:'ethena-usde', symbol:'USDe', peg:'usd', pegTarget:1 },
  { id:'frax', symbol:'FRAX', peg:'usd', pegTarget:1 },
  { id:'usdj', symbol:'USDJ', peg:'usd', pegTarget:1 },
  { id:'gemini-dollar', symbol:'GUSD', peg:'usd', pegTarget:1 },
  { id:'stasis-eurs', symbol:'EURS', peg:'usd', pegTarget:1.06 },
  { id:'liquity-usd', symbol:'LUSD', peg:'usd', pegTarget:1 },

const coinData = {}, kgsPerUsd = 87.45;
let selectedId = null;

function getStatus(coin, price, vol) {
  if (price == null || vol == null) return 'loading';
  if (vol < 5000) return 'low';
  const pegPrice = coin.peg === 'kgs' ? (coin.pegTarget / kgsPerUsd) : coin.pegTarget;
  const dev = Math.abs((price - pegPrice) / pegPrice) * 100;
  if (coin.peg === 'kgs') {
    if (dev <= 0.5) return 'kgst-ok';
    if (dev <= 2) return 'kgst-warn';
    return 'kgst-alert';
  }
  if (dev <= 0.3) return 'ok';
  if (dev <= 1) return 'warn';
  return 'alert';
}

function fmt4(n) { return n.toFixed(4); }
function fmtVol(n) {
  if (n == null) return '—';
  if (n < 1e3) return `$${n.toFixed(0)}`;
  if (n < 1e6) return `$${(n/1e3).toFixed(1)}K`;
  if (n < 1e9) return `$${(n/1e6).toFixed(1)}M`;
  return `$${(n/1e9).toFixed(2)}B`;
}

function renderCard(coin, container) {
  const d = coinData[coin.id] || {};
  const price = d.price != null ? d.price : null;
  const vol = d.vol != null ? d.vol : null;
  const status = getStatus(coin, price, vol);
  const pegPrice = coin.peg === 'kgs' ? (coin.pegTarget / kgsPerUsd) : coin.pegTarget;
  const dev = price != null ? ((price - pegPrice) / pegPrice) * 100 : null;
  const devSign = dev != null ? (dev >= 0 ? '+' : '') : '';
  const devText = dev != null ? `${devSign}${dev.toFixed(3)}%` : '—';
  const priceStr = price != null ? `$${fmt4(price)}` : '—';
  const barWidth = dev != null ? Math.min(Math.abs(dev) * 30, 100) : 0;

  const pegLabel = coin.peg === 'kgs' ? `KGS锚定 (≈$${(coin.pegTarget/kgsPerUsd).toFixed(5)})` : 'USD锚定';
  const pegTargetStr = coin.peg === 'kgs' ? `$${(pegPrice).toFixed(5)}` : `$${pegPrice.toFixed(4)}`;

  let existing = container.querySelector(`[data-coin-id="${coin.id}"]`);
  if (!existing) {
    existing = document.createElement('div');
    existing.className = `coin-card status-${status}`;
    existing.setAttribute('data-coin-id', coin.id);
    existing.onclick = () => showReserve(coin.id);
    container.appendChild(existing);
  } else {
    existing.className = `coin-card status-${status}`;
    if (selectedId === coin.id) existing.classList.add('selected');
  }

  const statusClass = status.includes('kgst') ? status.replace('kgst-', '') : status;
  existing.innerHTML = `
    <div class="coin-header">
      <div class="coin-symbol">${coin.symbol}</div>
      <div class="coin-status-dot dot-${status}"></div>
    </div>
    <div class="coin-peg-label">${pegLabel}</div>
    <div class="coin-price ${statusClass}">${priceStr}</div>
    <div class="coin-deviation ${statusClass}">${devText}</div>
    <div class="peg-bar-wrap"><div class="peg-bar ${statusClass}" style="width:${barWidth}%"></div></div>
    <div class="coin-meta">目标价格：${pegTargetStr}<br>24h 成交量：${fmtVol(vol)}</div>
  `;
}

function closeReserve() {
  selectedId = null;
  document.getElementById('reserve-panel').className = 'reserve-panel';
  document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('selected'));
}

function showReserve(id) {
  selectedId = id;
  const coin = COINS.find(c => c.id === id);
  const ri = reserves[id];
  const d = coinData[id] || {};
  const price = d.price, vol = d.vol, mc = d.mc;

  document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-coin-id="${id}"]`)?.classList.add('selected');

  if (!ri) {
    document.getElementById('rp-content').innerHTML = `<p style="color:#9b9b98;">暂无该币种的储备资产数据</p>`;
    document.getElementById('reserve-panel').className = 'reserve-panel visible';
    return;
  }

  const riskTagClass = { low:'tag-green', medium:'tag-amber', high:'tag-red', critical:'tag-red' }[ri.risk] || 'tag-gray';
  const attTagClass = { green:'tag-green', amber:'tag-amber', red:'tag-red', blue:'tag-blue', gray:'tag-gray' }[ri.attestTag] || 'tag-gray';

  let mktRows = `
    <div class="rp-row"><span class="rp-key">当前价格</span><span class="rp-val">${price ? '$'+fmt4(price) : '—'}</span></div>
    <div class="rp-row"><span class="rp-key">24h 成交量</span><span class="rp-val">${fmtVol(vol)}</span></div>
    <div class="rp-row"><span class="rp-key">市值</span><span class="rp-val">${fmtVol(mc)}</span></div>
  `;
  if (coin.peg === 'kgs' && kgsPerUsd) {
    const pegUsd = 1 / kgsPerUsd;
    mktRows += `<div class="rp-row"><span class="rp-key">KGS 锚定价</span><span class="rp-val">$${pegUsd.toFixed(5)}<br><small style="font-weight:400;color:#9b9b98">1 KGS = ${(1/kgsPerUsd).toFixed(5)} USD</small></span></div>`;
  }

  const dashLink = ri.dashboard
    ? `<a class="rp-link" href="${ri.dashboard}" target="_blank" rel="noopener">🔗 官方透明度页面 ↗</a>`
    : `<span style="font-size:11px;color:#9b9b98">无公开透明度页面</span>`;

  document.getElementById('rp-title').textContent = `${coin.symbol} — 储备资产详情`;
  document.getElementById('rp-content').innerHTML = `
    <div class="rp-grid">
      <div>
        <div class="rp-section-title">储备机制</div>
        <div class="rp-row"><span class="rp-key">稳定机制</span><span class="rp-val">${ri.mechanism}</span></div>
        <div class="rp-row"><span class="rp-key">抵押品</span><span class="rp-val">${ri.collateral}</span></div>
        <div class="rp-row"><span class="rp-key">抵押率</span><span class="rp-val">${ri.ratio}</span></div>
        <div class="rp-row"><span class="rp-key">审计方</span><span class="rp-val neutral" style="white-space:pre-line">${ri.audit}</span></div>
        <div class="rp-row"><span class="rp-key">认证频率</span><span class="rp-val"><span class="rp-tag ${attTagClass}">${ri.attestation}</span></span></div>
        <div class="rp-row"><span class="rp-key">风险评级</span><span class="rp-val"><span class="rp-tag ${riskTagClass}">${ri.riskLabel}</span></span></div>
        <div style="margin-top:10px;">${dashLink}<a class="rp-link" href="https://www.coingecko.com/en/coins/${id}" target="_blank" rel="noopener">📊 CoinGecko 行情 ↗</a></div>
      </div>
      <div>
        <div class="rp-section-title">市场数据</div>
        ${mktRows}
        <div class="rp-section-title" style="margin-top:14px;">风险提示</div>
        <p class="rp-note">${ri.note}</p>
      </div>
    </div>
  `;

  document.getElementById('reserve-panel').className = 'reserve-panel visible';
  setTimeout(() => {
    document.getElementById('reserve-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 60);
}

function distribute(rebuild) {
  const mainGrid = document.getElementById('main-grid');
  const kgsGrid = document.getElementById('kgs-grid');
  const lowSec = document.getElementById('low-section');

  if (rebuild) { mainGrid.innerHTML = ''; kgsGrid.innerHTML = ''; }

  let ok=0, warn=0, alert=0;
  const alerts = [], lowCoins = [];

  COINS.forEach(coin => {
    const d = coinData[coin.id] || {};
    const price = d.price != null ? d.price : null;
    const vol = d.vol != null ? d.vol : null;
    const status = getStatus(coin, price, vol);

    if (coin.peg === 'kgs') { renderCard(coin, kgsGrid); return; }
    if (status === 'low') { lowCoins.push(coin); return; }

    renderCard(coin, mainGrid);
    if (price !== null) {
      if (status === 'ok') ok++;
      else if (status === 'warn') warn++;
      else if (status === 'alert') { alert++; alerts.push(coin.symbol); }
    }
  });

  if (rebuild) {
    if (lowCoins.length === 0) {
      lowSec.innerHTML = '<div class="empty-section">暂无低交易量稳定币（当前所有稳定币成交量均高于 $5,000）</div>';
    } else {
      lowSec.innerHTML = '';
      const g = document.createElement('div'); g.className = 'grid'; lowSec.appendChild(g);
      lowCoins.forEach(c => renderCard(c, g));
    }
  }

  document.getElementById('total-count').textContent = COINS.length;
  document.getElementById('ok-count').textContent = ok || '—';
  document.getElementById('warn-count').textContent = warn || '—';
  document.getElementById('alert-count').textContent = alert || '—';

  const banner = document.getElementById('alert-banner');
  if (alerts.length > 0) {
    banner.className = 'alert-banner visible';
    document.getElementById('alert-text').textContent = `脱锚警报：${alerts.join('、')} 价格偏差超过 ±1%，请及时关注！`;
    
    // Trigger voice alert for depeg
    voiceSystem.checkDepegAlerts(alerts);
  } else {
    banner.className = 'alert-banner';
    voiceSystem.checkDepegAlerts([]);
  }
  
  // Check reserve risks
  voiceSystem.checkReserveRisks(COINS);
}

async function fetchKgsRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!r.ok) throw new Error('rate api err');
    const data = await r.json();
    if (data.rates && data.rates.KGS) {
      kgsPerUsd = data.rates.KGS;
      const bar = document.getElementById('kgs-rate-bar');
      bar.className = 'kgs-bar show';
      document.getElementById('kgs-rate-text').textContent =
        `当前 KGS/USD：1 USD ≈ ${kgsPerUsd.toFixed(4)} KGS  |  1 KGS ≈ $${(1/kgsPerUsd).toFixed(6)} USD  （来源：ExchangeRate-API，每日更新）`;
      return;
    }
  } catch(e) {}
  kgsPerUsd = 87.45;
  const bar = document.getElementById('kgs-rate-bar');
  bar.className = 'kgs-bar show';
  document.getElementById('kgs-rate-text').textContent =
    `KGS/USD 参考汇率（离线备用）：1 USD ≈ ${kgsPerUsd.toFixed(2)} KGS  |  1 KGS ≈ $${(1/kgsPerUsd).toFixed(6)} USD`;
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '加载中...'; btn.classList.add('loading');

  const ids = COINS.map(c => c.id).join(',');
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false`;

  try {
    const [, priceResp] = await Promise.all([fetchKgsRate(), fetch(url)]);
    if (!priceResp.ok) throw new Error('CoinGecko ' + priceResp.status);
    const data = await priceResp.json();
    data.forEach(item => { coinData[item.id] = { price: item.current_price, vol: item.total_volume, mc: item.market_cap }; });
    COINS.forEach(c => { if (!coinData[c.id]) coinData[c.id] = { price: null, vol: null, mc: null }; });
    distribute(true);
    if (selectedId) showReserve(selectedId);
    document.getElementById('update-time').textContent = '上次更新：' + new Date().toLocaleTimeString('zh-CN');
  } catch(e) {
    document.getElementById('main-grid').innerHTML =
      `<div class="error-msg">数据加载失败（${e.message}）。CoinGecko 免费 API 有频率限制，请稍后重试。</div>`;
  }

  btn.textContent = '刷新'; btn.classList.remove('loading');
}

distribute(true);
fetchAll();
setInterval(fetchAll, 60000);
