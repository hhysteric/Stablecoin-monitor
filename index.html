<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定币脱锚监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a18; padding: 1.5rem; }

.dashboard { max-width: 1100px; margin: 0 auto; }

.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
.header p { font-size: 13px; color: #6b6b68; }

.alert-banner { background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #A32D2D; display: none; }
.alert-banner.visible { display: flex; align-items: center; gap: 8px; }

.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.summary-card { background: #f1efe8; border-radius: 8px; padding: 12px 14px; }
.summary-label { font-size: 11px; color: #6b6b68; margin-bottom: 4px; }
.summary-val { font-size: 20px; font-weight: 500; color: #1a1a18; }

.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.section-title { font-size: 12px; font-weight: 500; color: #6b6b68; text-transform: uppercase; letter-spacing: 0.05em; flex: 1; padding-bottom: 6px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }

.threshold-info { font-size: 11px; color: #9b9b98; display: flex; gap: 12px; }
.t-item { display: flex; align-items: center; gap: 4px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; }

.refresh-btn { font-size: 12px; padding: 4px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px; background: transparent; color: #6b6b68; cursor: pointer; transition: all 0.15s; }
.refresh-btn:hover { background: #f1efe8; }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }

.coin-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; position: relative; transition: border-color 0.2s; cursor: pointer; }
.coin-card:hover { border-color: rgba(0,0,0,0.2); }
.coin-card.status-ok { border-left: 3px solid #1D9E75; }
.coin-card.status-warn { border-left: 3px solid #EF9F27; }
.coin-card.status-alert { border-left: 3px solid #E24B4A; }
.coin-card.status-low { border-left: 3px solid #378ADD; opacity: 0.85; }
.coin-card.status-loading { border-left: 3px solid rgba(0,0,0,0.1); }

.coin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.coin-symbol { font-size: 14px; font-weight: 500; color: #1a1a18; }
.coin-status-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-ok { background: #1D9E75; }
.dot-warn { background: #EF9F27; }
.dot-alert { background: #E24B4A; animation: pulse 1s infinite; }
.dot-low { background: #378ADD; }
.dot-loading { background: rgba(0,0,0,0.15); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.coin-price { font-size: 22px; font-weight: 500; color: #1a1a18; margin-bottom: 3px; }
.coin-price.ok { color: #1D9E75; }
.coin-price.warn { color: #BA7517; }
.coin-price.alert { color: #A32D2D; }

.coin-deviation { font-size: 12px; margin-bottom: 8px; }
.coin-deviation.ok { color: #3B6D11; }
.coin-deviation.warn { color: #854F0B; }
.coin-deviation.alert { color: #A32D2D; }

.coin-meta { font-size: 11px; color: #9b9b98; line-height: 1.5; }
.coin-vol { font-size: 11px; color: #6b6b68; }

.peg-bar-wrap { margin: 8px 0; height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
.peg-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.peg-bar.ok { background: #1D9E75; }
.peg-bar.warn { background: #EF9F27; }
.peg-bar.alert { background: #E24B4A; }

.skeleton { background: #f1efe8; border-radius: 4px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

.update-time { font-size: 11px; color: #9b9b98; margin-top: 8px; text-align: right; }
.error-msg { font-size: 12px; color: #6b6b68; text-align: center; padding: 20px; }

@media (max-width: 500px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .threshold-info { display: none; }
}
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>稳定币脱锚监控</h1>
    <p>实时监控稳定币价格，脱锚偏差超过阈值时自动预警 · 每60秒自动刷新</p>
  </div>

  <div id="alert-banner" class="alert-banner">
    <span style="font-size:16px">⚠</span>
    <span id="alert-text"></span>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="summary-label">监控总数</div>
      <div class="summary-val" id="total-count">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">正常锚定</div>
      <div class="summary-val" style="color:#1D9E75" id="ok-count">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">轻微偏差</div>
      <div class="summary-val" style="color:#BA7517" id="warn-count">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">脱锚警报</div>
      <div class="summary-val" style="color:#A32D2D" id="alert-count">—</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">主要监控稳定币</div>
    <div class="threshold-info">
      <span class="t-item"><span class="t-dot" style="background:#1D9E75"></span>±0.3%内</span>
      <span class="t-item"><span class="t-dot" style="background:#EF9F27"></span>±0.3~1%</span>
      <span class="t-item"><span class="t-dot" style="background:#E24B4A"></span>&gt;±1%</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">刷新</button>
  </div>
  <div class="grid" id="main-grid"></div>

  <div class="section-title" style="margin-bottom:10px;">低交易量稳定币（单日 &lt; $5,000）</div>
  <div class="grid" id="low-grid"></div>

  <div class="update-time" id="update-time"></div>
</div>

<script>
const COINS = [
  { id: 'usdd', symbol: 'USDD', name: 'USDD' },
  { id: 'united-stables', symbol: 'U', name: 'United Stables' },
  { id: 'usd1-wlfi', symbol: 'USD1', name: 'USD1 (WLFI)' },
  { id: 'ethena-usde', symbol: 'USDe', name: 'Ethena USDe' },
  { id: 'first-digital-usd', symbol: 'FDUSD', name: 'First Digital USD' },
  { id: 'just-stablecoin', symbol: 'USDJ', name: 'USDJ' },
  { id: 'true-usd', symbol: 'TUSD', name: 'TrueUSD' },
  { id: 'husd', symbol: 'HUSD', name: 'HUSD' },
  { id: 'wrapped-staked-usdt', symbol: 'WSTUSDT', name: 'Wrapped Staked USDT' },
  { id: 'stusdt-staked-usdt', symbol: 'stUSDT', name: 'stUSDT' },
  { id: 'kyrgyz-som-stablecoin', symbol: 'KGST', name: 'Kyrgyz Som Stablecoin' },
];

const LOW_VOL_THRESHOLD = 5000;
const WARN_THRESHOLD = 0.003;
const ALERT_THRESHOLD = 0.01;

let coinData = {};

function getStatus(price, vol) {
  if (price === null) return 'loading';
  if (vol !== null && vol < LOW_VOL_THRESHOLD) return 'low';
  const dev = Math.abs(price - 1);
  if (dev > ALERT_THRESHOLD) return 'alert';
  if (dev > WARN_THRESHOLD) return 'warn';
  return 'ok';
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return n.toFixed(4);
}

function fmtVol(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(2);
}

function fmtDev(price) {
  if (price === null) return '';
  const dev = ((price - 1) * 100);
  return (dev >= 0 ? '+' : '') + dev.toFixed(3) + '%';
}

function pegBarPct(price) {
  if (price === null) return 50;
  const dev = Math.abs(price - 1);
  return Math.max(0, Math.min(100, 100 - dev * 5000));
}

function renderCard(coin, container) {
  const d = coinData[coin.id];
  const price = d ? d.price : null;
  const vol = d ? d.vol : null;
  const mc = d ? d.mc : null;
  const status = getStatus(price, vol);
  const devClass = status === 'loading' ? '' : status === 'low' ? 'ok' : status;
  const priceClass = status === 'loading' ? '' : status === 'low' ? 'ok' : status;

  let card = document.getElementById('card-' + coin.id);
  if (!card) {
    card = document.createElement('div');
    card.id = 'card-' + coin.id;
    card.className = 'coin-card';
    card.onclick = () => window.open('https://www.coingecko.com/en/coins/' + coin.id, '_blank');
    container.appendChild(card);
  }

  card.className = 'coin-card status-' + status;
  card.innerHTML = `
    <div class="coin-header">
      <div class="coin-symbol">${coin.symbol}</div>
      <div class="coin-status-dot dot-${status}"></div>
    </div>
    ${price === null
      ? `<div class="skeleton" style="height:28px;width:80px;margin-bottom:6px"></div>`
      : `<div class="coin-price ${priceClass}">$${fmt(price)}</div>`}
    ${price === null
      ? `<div class="skeleton" style="height:14px;width:60px;margin-bottom:8px"></div>`
      : `<div class="coin-deviation ${devClass}">${fmtDev(price)}</div>`}
    <div class="peg-bar-wrap"><div class="peg-bar ${devClass}" style="width:${price===null?50:pegBarPct(price)}%"></div></div>
    <div class="coin-meta">
      <div class="coin-vol">成交量 ${fmtVol(vol)}</div>
      ${mc ? `<div>市值 ${fmtVol(mc)}</div>` : ''}
      <div style="margin-top:4px;font-size:10px;color:#9b9b98">${coin.name}</div>
    </div>
  `;
}

function distribute() {
  const mainGrid = document.getElementById('main-grid');
  const lowGrid = document.getElementById('low-grid');
  mainGrid.innerHTML = '';
  lowGrid.innerHTML = '';

  let ok=0, warn=0, alert=0;
  const alerts = [];

  COINS.forEach(coin => {
    const d = coinData[coin.id];
    const price = d ? d.price : null;
    const vol = d ? d.vol : null;
    const status = getStatus(price, vol);
    const container = (status === 'low') ? lowGrid : mainGrid;
    renderCard(coin, container);

    if (price !== null) {
      if (status === 'ok') ok++;
      else if (status === 'warn') warn++;
      else if (status === 'alert') { alert++; alerts.push(coin.symbol); }
    }
  });

  document.getElementById('total-count').textContent = COINS.length;
  document.getElementById('ok-count').textContent = ok || '—';
  document.getElementById('warn-count').textContent = warn || '—';
  document.getElementById('alert-count').textContent = alert || '—';

  const banner = document.getElementById('alert-banner');
  if (alerts.length > 0) {
    banner.className = 'alert-banner visible';
    document.getElementById('alert-text').textContent = `脱锚警报：${alerts.join('、')} 价格偏差超过 ±1%，请及时关注！`;
  } else {
    banner.className = 'alert-banner';
  }
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '加载中...';
  btn.classList.add('loading');

  const ids = COINS.map(c => c.id).join(',');
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false`;

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();

    data.forEach(item => {
      coinData[item.id] = { price: item.current_price, vol: item.total_volume, mc: item.market_cap };
    });

    COINS.forEach(coin => {
      if (!coinData[coin.id]) coinData[coin.id] = { price: null, vol: null, mc: null };
    });

    distribute();
    document.getElementById('update-time').textContent = '上次更新：' + new Date().toLocaleTimeString('zh-CN');
  } catch(e) {
    document.getElementById('main-grid').innerHTML += `<div class="error-msg">数据加载失败（${e.message}）。CoinGecko 免费 API 有频率限制，请稍后重试。</div>`;
  }

  btn.textContent = '刷新';
  btn.classList.remove('loading');
}

distribute();
fetchAll();
setInterval(fetchAll, 60000);
</script>
</body>
</html>
