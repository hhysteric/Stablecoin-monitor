* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f9f9f7; color: #1a1a18; padding: 1.5rem; font-size: 15px; }
.dashboard { max-width: 1100px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 24px; font-weight: 700; color: #1a1a18; margin-bottom: 6px; letter-spacing: 0.01em; }
.header p { font-size: 14px; color: #6b6b68; line-height: 1.6; }
.alert-banner { background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #A32D2D; display: none; align-items: center; gap: 8px; }
.alert-banner.visible { display: flex; }
.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.summary-card { background: #f1efe8; border-radius: 10px; padding: 13px 14px; border: 0.5px solid rgba(0,0,0,0.06); }
.summary-label { font-size: 12px; color: #6b6b68; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.02em; }
.summary-val { font-size: 24px; font-weight: 700; color: #1a1a18; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.section-title-text { font-size: 13px; font-weight: 700; color: #5b5b58; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
.threshold-info { font-size: 11px; color: #9b9b98; display: flex; gap: 12px; flex-wrap: wrap; }
.t-item { display: flex; align-items: center; gap: 4px; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 0 0 10px 0; }
.btn { font-size: 12px; font-weight: 600; padding: 5px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 7px; background: transparent; color: #6b6b68; cursor: pointer; transition: all 0.15s; white-space: nowrap; text-decoration: none; display: inline-block; }
.btn:hover { background: #f1efe8; }
.btn.loading { opacity: 0.5; pointer-events: none; }
.btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.tg-icon { width: 13px; height: 13px; vertical-align: -2px; margin-right: 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.coin-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 14px; position: relative; transition: border-color 0.2s, box-shadow 0.2s; cursor: pointer; }
.coin-card:hover { border-color: rgba(0,0,0,0.25); }
.coin-card.selected { border-color: #1a1a18 !important; box-shadow: 0 0 0 1px #1a1a18; }
.coin-card.status-ok      { border-left: 3px solid #1D9E75; }
.coin-card.status-warn    { border-left: 3px solid #EF9F27; }
.coin-card.status-alert   { border-left: 3px solid #E24B4A; }
.coin-card.status-low     { border-left: 3px solid #378ADD; opacity: 0.85; }
.coin-card.status-loading { border-left: 3px solid rgba(0,0,0,0.1); }
.coin-card.status-kgst-ok    { border-left: 3px solid #7F77DD; }
.coin-card.status-kgst-warn  { border-left: 3px solid #EF9F27; }
.coin-card.status-kgst-alert { border-left: 3px solid #E24B4A; }
.coin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.coin-symbol { font-size: 15px; font-weight: 700; color: #1a1a18; }
.coin-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok, .dot-kgst-ok { background: #1D9E75; }
.dot-kgst-ok { background: #7F77DD; }
.dot-warn, .dot-kgst-warn { background: #EF9F27; }
.dot-alert, .dot-kgst-alert { background: #E24B4A; animation: pulse 1s infinite; }
.dot-low { background: #378ADD; }
.dot-loading { background: rgba(0,0,0,0.15); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.coin-peg-label { font-size: 10px; color: #b0b0ab; margin-bottom: 4px; }
.coin-price { font-size: 25px; font-weight: 700; color: #1a1a18; margin-bottom: 2px; letter-spacing: 0.01em; }
.coin-price.ok, .coin-price.kgst-ok { color: #1D9E75; }
.coin-price.warn, .coin-price.kgst-warn { color: #BA7517; }
.coin-price.alert, .coin-price.kgst-alert { color: #A32D2D; }
.coin-deviation { font-size: 13px; margin-bottom: 8px; font-weight: 700; }
.coin-deviation.ok, .coin-deviation.kgst-ok { color: #3B6D11; }
.coin-deviation.warn, .coin-deviation.kgst-warn { color: #854F0B; }
.coin-deviation.alert, .coin-deviation.kgst-alert { color: #A32D2D; }
.coin-meta { font-size: 11px; color: #9b9b98; line-height: 1.6; }
.coin-vol { font-size: 11px; color: #6b6b68; }
.peg-bar-wrap { margin: 8px 0; height: 4px; background: #f1efe8; border-radius: 2px; overflow: hidden; }
.peg-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.peg-bar.ok { background: #1D9E75; }
.peg-bar.warn { background: #EF9F27; }
.peg-bar.alert { background: #E24B4A; }
.peg-bar.kgst-ok { background: #7F77DD; }
.peg-bar.kgst-warn { background: #EF9F27; }
.peg-bar.kgst-alert { background: #E24B4A; }
.skeleton { background: #f1efe8; border-radius: 4px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
.reserve-btn { font-size: 11px; margin-top: 8px; padding: 4px 8px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 5px; background: transparent; color: #6b6b68; cursor: pointer; transition: all 0.15s; width: 100%; }
.reserve-btn:hover { background: #f9f9f7; }
.reserve-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
/* Reserve panel */
.reserve-panel { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
.reserve-panel.visible { display: block; }
.rp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.rp-title { font-size: 15px; font-weight: 500; }
.rp-close { background: none; border: none; cursor: pointer; font-size: 18px; color: #9b9b98; padding: 0; line-height: 1; }
.rp-close:hover { color: #1a1a18; }
.rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
@media (max-width: 600px) { .rp-grid { grid-template-columns: 1fr; } }
.rp-section-title { font-size: 11px; font-weight: 500; color: #9b9b98; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.rp-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); font-size: 12px; gap: 12px; }
.rp-row:last-child { border-bottom: none; }
.rp-key { color: #6b6b68; flex-shrink: 0; min-width: 72px; }
.rp-val { color: #1a1a18; text-align: right; font-weight: 500; word-break: break-word; }
.rp-val.neutral { color: #6b6b68; font-weight: 400; }
.rp-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; }
.tag-green { background: #EAF3DE; color: #3B6D11; }
.tag-amber { background: #FAEEDA; color: #854F0B; }
.tag-red   { background: #FCEBEB; color: #A32D2D; }
.tag-gray  { background: #f1efe8; color: #5F5E5A; }
.tag-blue  { background: #E6F1FB; color: #185FA5; }
.tag-purple{ background: #EEEDFE; color: #534AB7; }
.rp-note { font-size: 11px; color: #6b6b68; line-height: 1.6; }
.rp-link { font-size: 11px; color: #185FA5; text-decoration: none; display: block; margin-top: 4px; }
.rp-link:hover { text-decoration: underline; }
.kgs-bar { background: #EEEDFE; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: #534AB7; display: none; align-items: center; gap: 8px; }
.kgs-bar.show { display: flex; }
.update-time { font-size: 11px; color: #9b9b98; margin-top: 8px; text-align: right; }
.empty-section { font-size: 12px; color: #9b9b98; padding: 10px 0 16px; }
.error-msg { font-size: 12px; color: #6b6b68; text-align: center; padding: 20px; grid-column: 1/-1; }
@media (max-width: 500px) {
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .threshold-info { display: none; }
  body { padding: 1rem; }

    note: '锚定目标为吉尔吉斯斯坦索姆（KGS）而非美元。KGS 相对稳定（约 87 KGS/USD），法币汇率波动较小。因此监控脱锚需使用 KGS/USD 实时汇率作为参考价格，而非固定 $1.0。',
    dashboard: null,
  },
};

const LOW_VOL_THRESHOLD = 5000;
const WARN_THRESHOLD    = 0.003;
const ALERT_THRESHOLD   = 0.01;

let coinData   = {};
let kgsPerUsd  = null;
let selectedId = null;
let trendData  = {};
let voiceAlertEnabled = false;
let offPegAlertLevel  = {};
const TG_BOT_TOKEN_KEY  = 'stablecoin_monitor_tg_bot_token';
const TG_CHAT_ID_KEY    = 'stablecoin_monitor_tg_chat_id';
const TG_ENABLED_KEY    = 'stablecoin_monitor_tg_enabled';
const TG_DEFAULT_BOT_TOKEN = '8733255882:AAGjQZJIRhbB--QqXyJvqwMA5OwK4W-NdTU';
const TG_DEFAULT_CHAT_ID = '-1003729489013';
let telegramEnabled = false;
let telegramBotToken = '';
let telegramChatId = '';
const ALERT_COOLDOWN_MS = 10 * 60 * 1000;
let lastNotifyAt = {};

function getCoinGeckoId(coinOrId) {
  const coin = typeof coinOrId === 'string'
    ? COINS.find(c => c.id === coinOrId)
    : coinOrId;
  return coin?.cgId || coin?.id || coinOrId;
}

function getStatus(coin, price, vol) {
  if (price === null) return 'loading';
  if (coin.peg === 'kgs') {
    if (kgsPerUsd === null) return 'loading';
    const pegUsd = 1 / kgsPerUsd;
    const dev = Math.abs(price - pegUsd) / pegUsd;
    if (dev > ALERT_THRESHOLD) return 'kgst-alert';
    if (dev > WARN_THRESHOLD)  return 'kgst-warn';
    return 'kgst-ok';
  }
  if (vol !== null && vol < LOW_VOL_THRESHOLD) return 'low';
  const dev = Math.abs(price - 1);
  if (dev > ALERT_THRESHOLD) return 'alert';
  if (dev > WARN_THRESHOLD)  return 'warn';
  return 'ok';
}

function devClass(s) {
  if (s === 'loading') return '';
  if (s === 'low') return 'ok';
  return s;
}

function fmt4(n)    { return n === null ? '—' : n.toFixed(4); }
function fmtVol(n)  {
  if (!n && n !== 0) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(2);
}
function fmtPct(n) {
  if (n === null || !Number.isFinite(n)) return '—';
  const s = (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const c = n > 0 ? '#A32D2D' : (n < 0 ? '#1D9E75' : '#6b6b68');
  return `<span style="color:${c}">${s}</span>`;
}
function pctChange(curr, prev) {
  if (curr === null || prev === null || !Number.isFinite(curr) || !Number.isFinite(prev) || prev === 0) return null;
  return (curr - prev) / prev * 100;
}
function closestPoint(points, targetTs) {
  if (!Array.isArray(points) || points.length === 0) return null;
  let best = points[0], bestDiff = Math.abs(points[0][0] - targetTs);
  for (let i = 1; i < points.length; i++) {
    const p = points[i];
    const d = Math.abs(p[0] - targetTs);
    if (d < bestDiff) { best = p; bestDiff = d; }
  }
  return best;
}
function avg(nums) {
  if (!nums.length) return null;
  return nums.reduce((a, b) => a + b, 0) / nums.length;
}
function toggleVoiceAlert() {
  voiceAlertEnabled = !voiceAlertEnabled;
  const btn = document.getElementById('voice-alert-btn');
  btn.textContent = voiceAlertEnabled ? '🔊 语音警报：开' : '🔈 语音警报：关';
  btn.className = voiceAlertEnabled ? 'btn active' : 'btn';
  if (voiceAlertEnabled) {
    offPegAlertLevel = {};
  }
}
function refreshTelegramBtn() {
  const btn = document.getElementById('tg-alert-btn');
  if (!btn) return;
  const ok = telegramEnabled && !!telegramBotToken && !!telegramChatId;
  btn.textContent = ok ? '📩 TG：开' : '📩 TG：关';
  btn.className = ok ? 'btn active' : 'btn';
}
function initTelegramConfig() {
  try {
    telegramBotToken = TG_DEFAULT_BOT_TOKEN;
    telegramChatId = localStorage.getItem(TG_CHAT_ID_KEY) || TG_DEFAULT_CHAT_ID;
    const enabledVal = localStorage.getItem(TG_ENABLED_KEY);
    telegramEnabled = enabledVal === null
      ? (!!telegramBotToken && !!telegramChatId)
      : (enabledVal === '1' && !!telegramBotToken && !!telegramChatId);
    localStorage.setItem(TG_BOT_TOKEN_KEY, telegramBotToken);
    if (telegramChatId) localStorage.setItem(TG_CHAT_ID_KEY, telegramChatId);

    telegramEnabled = false;

  }

}
function toggleTelegramAlert() {

}
async function sendTelegramAlert(text, force = false) {
  if ((!telegramEnabled && !force) || !telegramBotToken || !telegramChatId) return;
  const resp = await fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: telegramChatId, text }),
  });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok || !data.ok) {
    throw new Error(data.description || ('HTTP ' + resp.status));
  }
  return data;
}
async function sendTelegramTest() {
  if (!telegramBotToken || !telegramChatId) {
    window.alert('TG 默认配置缺失，请联系管理员检查网页内置 Token/Chat ID。');
    return;
  }
  try {
    await sendTelegramAlert(`✅ Stablecoin Monitor TG 测试消息：${new Date().toLocaleString('zh-CN')}`, true);
    window.alert('Telegram 测试消息发送成功。');
  } catch (e) {
    window.alert('Telegram 测试失败：' + e.message);
  }
}
function canNotify(key) {
  const now = Date.now();
  const prev = lastNotifyAt[key] || 0;
  if (now - prev < ALERT_COOLDOWN_MS) return false;
  lastNotifyAt[key] = now;
  return true;
}
function speakAlert(text) {
  if (!voiceAlertEnabled) return;
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function triggerOffPegAlerts(mainUsdCoins) {
  if (!voiceAlertEnabled && !telegramEnabled) return;
  mainUsdCoins.forEach(({ coin, price }) => {
    if (price === null) return;
    const dev = Math.abs(price - 1);
    const level = dev >= 0.10 ? 2 : (dev >= 0.01 ? 1 : 0);
    const prev = offPegAlertLevel[coin.id] || 0;
    offPegAlertLevel[coin.id] = level;

    if (level <= prev || level === 0) return;
    if (level === 1) {
      if (voiceAlertEnabled && canNotify(`voice-l1-${coin.id}`)) {
        speakAlert(`警报，${coin.symbol} 脱锚超过百分之一，当前价格 ${price.toFixed(4)} 美元`);
      }
      if (telegramEnabled && canNotify(`tg-l1-${coin.id}`)) {
        sendTelegramAlert(`⚠️ 脱锚提醒：${coin.symbol} 偏离锚定超过 1%，当前价格 $${price.toFixed(4)}。`).catch(() => {});
      }
      return;
    }
    if (voiceAlertEnabled && canNotify(`voice-l2-${coin.id}`)) {
      speakAlert(`紧急警报，${coin.symbol} 脱锚超过百分之十`);
    }
    if (telegramEnabled && canNotify(`tg-l2-${coin.id}`)) {
      sendTelegramAlert(`🚨 紧急脱锚：${coin.symbol} 偏离锚定超过 10%，当前价格 $${price.toFixed(4)}，请立即关注。`).catch(() => {});
    }
    if (voiceAlertEnabled && canNotify(`popup-l2-${coin.id}`)) {
      window.alert(`⚠️ 紧急脱锚弹窗\n${coin.symbol} 当前价格 $${price.toFixed(4)}，偏离锚定超过 10%，请立即关注。`);
    }
  });
}

function fmtDev(coin, price) {
  if (price === null) return '';
  if (coin.peg === 'kgs' && kgsPerUsd) {
    const pegUsd = 1 / kgsPerUsd;
    const pct = (price - pegUsd) / pegUsd * 100;
    return (pct >= 0 ? '+' : '') + pct.toFixed(3) + '%（vs KGS 锚定）';
  }
  const pct = (price - 1) * 100;
  return (pct >= 0 ? '+' : '') + pct.toFixed(3) + '%';
}

function pegBarPct(coin, price) {
  if (price === null) return 50;
  let dev;
  if (coin.peg === 'kgs' && kgsPerUsd) {
    const pegUsd = 1 / kgsPerUsd;
    dev = Math.abs(price - pegUsd) / pegUsd;
  } else {
    dev = Math.abs(price - 1);
  }
  return Math.max(0, Math.min(100, 100 - dev * 5000));
}

function renderCard(coin, container) {
  const d      = coinData[coin.id] || {};
  const price  = d.price != null ? d.price : null;
  const vol    = d.vol   != null ? d.vol   : null;
  const mc     = d.mc    != null ? d.mc    : null;
  const status = getStatus(coin, price, vol);
  const dc     = devClass(status);
  const isSelected = selectedId === coin.id;
  const ri     = RESERVE_INFO[coin.id];

  selectedId = null;

}

async function fetchTrendData(id) {
  if (trendData[id]) return trendData[id];
  const cgId = getCoinGeckoId(id);
  try {
    const u = `https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=usd&days=30&interval=daily`;
    const r = await fetch(u);
    if (!r.ok) throw new Error('market_chart ' + r.status);
    const j = await r.json();
    const prices = j.prices || [];
    const vols   = j.total_volumes || [];
    const mcs    = j.market_caps || [];
    if (!prices.length || !vols.length || !mcs.length) throw new Error('empty trend');

    const latestVol = vols[vols.length - 1][1];
    const latestMc  = mcs[mcs.length - 1][1];
    const latestP   = prices[prices.length - 1][1];

    const now = Date.now();
    const p7V  = closestPoint(vols, now - 7 * 24 * 3600 * 1000);
    const p30V = closestPoint(vols, now - 30 * 24 * 3600 * 1000);
    const p7M  = closestPoint(mcs, now - 7 * 24 * 3600 * 1000);
    const p30M = closestPoint(mcs, now - 30 * 24 * 3600 * 1000);
    const p7P  = closestPoint(prices, now - 7 * 24 * 3600 * 1000);
    const p30P = closestPoint(prices, now - 30 * 24 * 3600 * 1000);

    const supNow = (latestMc > 0 && latestP > 0) ? latestMc / latestP : null;
    const sup7   = (p7M && p7P && p7M[1] > 0 && p7P[1] > 0) ? p7M[1] / p7P[1] : null;
    const sup30  = (p30M && p30P && p30M[1] > 0 && p30P[1] > 0) ? p30M[1] / p30P[1] : null;

    const prev7 = vols.slice(Math.max(0, vols.length - 8), Math.max(0, vols.length - 1)).map(v => v[1]).filter(v => Number.isFinite(v));
    const avg7 = avg(prev7);

    trendData[id] = {
      vol7: pctChange(latestVol, p7V ? p7V[1] : null),
      vol30: pctChange(latestVol, p30V ? p30V[1] : null),
      mc7: pctChange(latestMc, p7M ? p7M[1] : null),
      mc30: pctChange(latestMc, p30M ? p30M[1] : null),
      supply7: pctChange(supNow, sup7),
      supply30: pctChange(supNow, sup30),
      volSpike: (avg7 && avg7 > 0) ? latestVol / avg7 : null,
    };
    return trendData[id];
  } catch (e) {
    trendData[id] = { error: true };
    return trendData[id];
  }
}

function trendPair(v7, v30) {
  return `7d ${fmtPct(v7)} / 30d ${fmtPct(v30)}`;
}

function buildAbnormalHint(t) {
  if (!t || t.error) return '趋势数据加载中或暂不可用。';
  const notes = [];
  if (t.volSpike !== null && t.volSpike >= 3) notes.push(`最新日成交量约为近7日均值的 ${t.volSpike.toFixed(2)}x，存在巨额交易迹象`);
  if (t.supply7 !== null && t.supply7 >= 5) notes.push(`估算流通量 7d 增加 ${t.supply7.toFixed(2)}%，可能出现较大增发`);
  if (t.supply7 !== null && t.supply7 <= -5) notes.push(`估算流通量 7d 减少 ${Math.abs(t.supply7).toFixed(2)}%，可能出现较大销毁`);
  if (notes.length === 0) return '近期未见明显“巨额交易/巨额增发/巨额销毁”信号（仅基于 CoinGecko 时间序列推断）。';
  return notes.join('；') + '。';
}

function distribute(rebuild) {
  const mainGrid  = document.getElementById('main-grid');
  const yieldGrid = document.getElementById('yield-grid');
  const kgsGrid   = document.getElementById('kgs-grid');
  const lowSec    = document.getElementById('low-section');
  const yieldCoinIds = new Set(['wrapped-staked-usdt', 'stusdt-staked-usdt']);

  if (rebuild) { mainGrid.innerHTML = ''; yieldGrid.innerHTML = ''; kgsGrid.innerHTML = ''; }

  let ok=0, warn=0, alert=0;
  const alerts = [], lowCoins = [], mainUsdCoins = [];

  COINS.forEach(coin => {
    const d      = coinData[coin.id] || {};
    const price  = d.price != null ? d.price : null;
    const vol    = d.vol   != null ? d.vol   : null;
    const status = getStatus(coin, price, vol);

    if (coin.peg === 'kgs') { renderCard(coin, kgsGrid); return; }
    if (yieldCoinIds.has(coin.id)) {
      renderCard(coin, yieldGrid);
      if (price !== null) {
        if (status === 'ok') ok++;
        else if (status === 'warn') warn++;
        else if (status === 'alert') { alert++; alerts.push(coin.symbol); }
      }
      return;
    }
    if (status === 'low') { lowCoins.push(coin); return; }

    renderCard(coin, mainGrid);
    mainUsdCoins.push({ coin, price });
    if (price !== null) {
      if (status === 'ok') ok++;
      else if (status === 'warn') warn++;
      else if (status === 'alert') { alert++; alerts.push(coin.symbol); }
    }
  });

  if (rebuild) {
    if (lowCoins.length === 0) {
      lowSec.innerHTML = '<div class="empty-section">暂无低交易量稳定币（当前所有稳定币成交量均高于 $5,000）</div>';
    } else {
      lowSec.innerHTML = '';
      const g = document.createElement('div'); g.className = 'grid'; lowSec.appendChild(g);
      lowCoins.forEach(c => renderCard(c, g));
    }
  }

  document.getElementById('total-count').textContent = COINS.length;
  document.getElementById('ok-count').textContent    = ok    || '—';
  document.getElementById('warn-count').textContent  = warn  || '—';
  document.getElementById('alert-count').textContent = alert || '—';

  const banner = document.getElementById('alert-banner');
  if (alerts.length > 0) {
    banner.className = 'alert-banner visible';
    document.getElementById('alert-text').textContent = `脱锚警报：${alerts.join('、')} 价格偏差超过 ±1%，请及时关注！`;
  } else {
    banner.className = 'alert-banner';
  }

  triggerOffPegAlerts(mainUsdCoins);
}

async function fetchKgsRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!r.ok) throw new Error('rate api err');
    const data = await r.json();
    if (data.rates && data.rates.KGS) {
      kgsPerUsd = data.rates.KGS;
      const bar = document.getElementById('kgs-rate-bar');
      bar.className = 'kgs-bar show';
      document.getElementById('kgs-rate-text').textContent =
        `当前 KGS/USD：1 USD ≈ ${kgsPerUsd.toFixed(4)} KGS  |  1 KGS ≈ $${(1/kgsPerUsd).toFixed(6)} USD  （来源：ExchangeRate-API，每日更新）`;
      return;
    }
  } catch(e) {}
  kgsPerUsd = 87.45;
  const bar = document.getElementById('kgs-rate-bar');
  bar.className = 'kgs-bar show';
  document.getElementById('kgs-rate-text').textContent =
    `KGS/USD 参考汇率（离线备用）：1 USD ≈ ${kgsPerUsd.toFixed(2)} KGS  |  1 KGS ≈ $${(1/kgsPerUsd).toFixed(6)} USD`;
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '加载中...'; btn.classList.add('loading');

  const ids = [...new Set(COINS.map(c => getCoinGeckoId(c)))].join(',');
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false`;

  try {
    const [, priceResp] = await Promise.all([fetchKgsRate(), fetch(url)]);
    if (!priceResp.ok) throw new Error('CoinGecko ' + priceResp.status);
    const data = await priceResp.json();
    data.forEach(item => {
      const coin = COINS.find(c => getCoinGeckoId(c) === item.id);
      if (!coin) return;
      coinData[coin.id] = { price: item.current_price, vol: item.total_volume, mc: item.market_cap };
    });
    COINS.forEach(c => { if (!coinData[c.id]) coinData[c.id] = { price: null, vol: null, mc: null }; });
    distribute(true);
    if (selectedId) showReserve(selectedId);
    document.getElementById('update-time').textContent = '上次更新：' + new Date().toLocaleTimeString('zh-CN');
  } catch(e) {
    document.getElementById('main-grid').innerHTML =
      `<div class="error-msg">数据加载失败（${e.message}）。CoinGecko 免费 API 有频率限制，请稍后重试。</div>`;
  }

  btn.textContent = '刷新'; btn.classList.remove('loading');
}

distribute(true);
initTelegramConfig();
fetchAll();
setInterval(fetchAll, 60000);
</script>
