<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stablecoin Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
        .alert { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Stablecoin Monitor</h1>
    <table>
        <thead>
            <tr>
                <th>Stablecoin</th>
                <th>Price</th>
                <th>Backing Asset</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="stablecoin-table">
            <!-- Data will be populated here dynamically -->
        </tbody>
    </table>

    <script>
        const stablecoins = [
            { name: 'USDD', expectedPeg: 1 },
            { name: 'U', expectedPeg: 1 },
            { name: 'USD1', expectedPeg: 1 },
            { name: 'USDe', expectedPeg: 1 },
            { name: 'FDUSD', expectedPeg: 1 },
            { name: 'USDJ', expectedPeg: 1 },
            { name: 'TUSD', expectedPeg: 1 },
            { name: 'HUSD', expectedPeg: 1 },
            { name: 'WSTUSDT', expectedPeg: 1 },
            { name: 'stUSDT', expectedPeg: 1 },
            { name: 'KGST', expectedPeg: 1 },
        ];

        function fetchStablecoinPrices() {
            // Here you would typically fetch data from an API
            // For demonstration purposes, we'll simulate fetching prices
            stablecoins.forEach(stablecoin => {
                const price = (Math.random() * 2).toFixed(2); // Simulated price
                const status = Math.abs(price - stablecoin.expectedPeg) > 0.1 ? 'De-Pegged' : 'Stable';
                document.getElementById('stablecoin-table').innerHTML += `
                    <tr>
                        <td>${stablecoin.name}</td>
                        <td>${price}</td>
                        <td>${stablecoin.name} Asset</td>
                        <td class="${status === 'De-Pegged' ? 'alert' : ''}">${status}</td>
                    </tr>
                `;
            });
        }

        setInterval(fetchStablecoinPrices, 5000); // Refresh data every 5 seconds
        fetchStablecoinPrices(); // Initial fetch
    </script>
</body>
</html>
